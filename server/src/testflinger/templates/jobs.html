{% extends "base.html" %}
{% set active_page = "jobs" %}
{% set title = "Jobs" %}
{% block content %}
  <div class="p-strip is-shallow">
    <div class="row">
      <h1 class="p-heading--3">Jobs</h1>
    </div>
  </div>
  <table aria-label="Jobs table" class="p-table--mobile-card">
    <thead>
      <tr>
        <th aria-sort="none">
          <button class="p-table__sort-button">Job ID</button>
        </th>
        <th aria-sort="none">
          <button class="p-table__sort-button">Queue</button>
        </th>
        <th aria-sort="none" style="width: 100pt">
          <button class="p-table__sort-button">State</button>
        </th>
        <th aria-sort="none" style="width: 150pt">
          <button class="p-table__sort-button">Created At</button>
        </th>
      </tr>
    </thead>
    <tbody>
      {% for job in jobs %}
        <tr>
          <td data-heading="Job ID">
            <a href="{{ url_for('testflinger.job_detail', job_id=job.job_id) }}">{{ job.job_id }}</a>
          </td>
          <td data-heading="Queue">
            <a href="{{ url_for('testflinger.queue_detail', queue_name=job.job_data.job_queue) }}">{{ job.job_data.job_queue }}</a>
          </td>
          <td data-heading="State">{{ job.result_data.job_state }}</td>
          <td data-heading="Created At">{{ job.created_at.strftime("%Y-%m-%d %H:%M:%S") }}</td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
{% endblock content %}
