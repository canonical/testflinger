#cloud-config
# Testflinger Multipass Dev Environment - Ubuntu 24.04 (noble)
#
# Usage:
#   multipass launch --name testflinger -c4 -m12GB -d32GB \
#     --cloud-init server/devel/testflinger.yaml
#
# After cloud-init completes, run the setup script:
#   server/devel/setup-vm.sh
#

# Ensure ubuntu user is in the 'users' group (GID 100) for mount compatibility
groups:
  - users

system_info:
  default_user:
    groups: [adm, cdrom, dip, lxd, sudo, users]

write_files:
# Server environment (matches env vars read by server/src/testflinger/database.py)
- content: |
    MONGODB_HOST=localhost
    MONGODB_DATABASE=testflinger_db
    MONGODB_PORT=27017
    JWT_SIGNING_KEY=dev-signing-key
    WEB_SECRET_KEY=dev-web-secret
  path: /home/ubuntu/testflinger-server.env

# Agent config (YAML, read by testflinger-agent -c)
- content: |
    agent_id: vm1-agent
    server_address: http://localhost:5000
    job_queues:
      - vm1
    polling_interval: 10
    execution_basedir: /tmp/testflinger/run
    logging_basedir: /tmp/testflinger/logs
    results_basedir: /tmp/testflinger/results
  path: /home/ubuntu/testflinger-agent.conf

# CLI config
- content: |
    [testflinger-cli]
    server = http://localhost:5000
  path: /home/ubuntu/.config/testflinger-cli.conf

# Example job (queue matches agent config)
- content: |
    job_queue: vm1
    provision_data:
      distro: noble
    test_data:
      test_cmds: |
        free -m
        ip a
  path: /home/ubuntu/example-job.yaml

# README
- content: |
    Testflinger Multipass Dev Environment (noble)
    ==============================================

    All testflinger components run inside this VM with the source tree
    mounted from the host at /srv/testflinger.

    Quick start:
      $ testflinger submit -p ~/example-job.yaml

    Services:
      $ sudo systemctl status testflinger
      $ sudo systemctl status testflinger-agent
      $ journalctl -u testflinger -f
      $ journalctl -u testflinger-agent -f

    Server: http://localhost:5000
  path: /home/ubuntu/README

# Systemd: testflinger server (gunicorn, same as Dockerfile entrypoint)
- content: |
    [Unit]
    Description=Testflinger Server
    After=network.target mongod.service
    Wants=mongod.service

    [Service]
    Type=simple
    User=ubuntu
    WorkingDirectory=/srv/testflinger/server
    EnvironmentFile=/home/ubuntu/testflinger-server.env
    ExecStart=/usr/local/bin/uv run gunicorn --bind 0.0.0.0:5000 --worker-class gevent app:app
    Restart=always
    RestartSec=10

    [Install]
    WantedBy=multi-user.target
  path: /etc/systemd/system/testflinger.service

# Systemd: testflinger agent
- content: |
    [Unit]
    Description=Testflinger Agent
    After=network.target testflinger.service
    Wants=testflinger.service

    [Service]
    Type=simple
    User=ubuntu
    WorkingDirectory=/srv/testflinger/agent
    ExecStart=/usr/local/bin/uv run testflinger-agent -c /home/ubuntu/testflinger-agent.conf
    Restart=always
    RestartSec=10

    [Install]
    WantedBy=multi-user.target
  path: /etc/systemd/system/testflinger-agent.service

packages:
  - curl
  - python3-venv

runcmd:
  - set -e

  # --- MongoDB 6.0 (jammy repo, verified working on noble) ---
  - wget -qO - https://www.mongodb.org/static/pgp/server-6.0.asc | tee /etc/apt/trusted.gpg.d/server-6.0.asc >/dev/null
  - echo "deb [ arch=amd64,arm64 ] https://repo.mongodb.org/apt/ubuntu jammy/mongodb-org/6.0 multiverse" | tee /etc/apt/sources.list.d/mongodb-org-6.0.list
  - apt-get update -qq
  - apt-get install -y -qq mongodb-org
  - systemctl enable mongod
  - systemctl start mongod
  - sleep 3
  - systemctl is-active mongod

  # --- uv (standalone binary via official installer, NOT snap) ---
  - curl -LsSf https://astral.sh/uv/install.sh | INSTALLER_NO_MODIFY_PATH=1 UV_INSTALL_DIR=/usr/local/bin sh
  - uv --version

  # --- Directory setup ---
  - mkdir -p /home/ubuntu/.config
  - chown -R ubuntu:ubuntu /home/ubuntu
  - mkdir -p /srv/testflinger
  - mkdir -p /srv/testflinger/data
  - mkdir -p /tmp/testflinger/{run,logs,results}
  - chown -R ubuntu:ubuntu /srv/testflinger /tmp/testflinger

  # --- Verify config files ---
  - test -f /home/ubuntu/testflinger-server.env && echo "testflinger-server.env OK"
  - test -f /home/ubuntu/testflinger-agent.conf && echo "testflinger-agent.conf OK"
  - test -f /home/ubuntu/.config/testflinger-cli.conf && echo "testflinger-cli.conf OK"
  - test -f /home/ubuntu/example-job.yaml && echo "example-job.yaml OK"

  # --- Register systemd services (start after mount + uv sync) ---
  - systemctl daemon-reload
  - systemctl enable testflinger.service
  - systemctl enable testflinger-agent.service

  - 'echo "=== Cloud-init complete: run server/devel/setup-vm.sh to finish ==="'
