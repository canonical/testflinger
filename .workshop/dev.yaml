name: dev
base: ubuntu@24.04
sdks:
  - name: just
  - name: uv
  - name: vscode-remote
  - name: opencode
  - name: docker-ce
    slots:
      testflinger-server:
        interface: tunnel
        endpoint: localhost:5000  # in the workshop
      dex-server:
        interface: tunnel
        endpoint: localhost:5556  # in the workshop
  - name: system
    plugs:
      testflinger-server:
        interface: tunnel
        endpoint: localhost:5000  # on the host
      dex-server:
        interface: tunnel
        endpoint: localhost:5556  # on the host

actions:
  just: just "$@"
  serve: just server::serve
  restart: just server::restart
  teardown: just server::teardown
  logs: just server::logs
  docker-prune: docker system prune -a --yes
  populate-quick: just server::populate-quick
  populate: just server::populate "$@"
