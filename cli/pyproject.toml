[build-system]
requires = ["setuptools>=78.1.0", "setuptools-scm>=8.2.0"]
build-backend = "setuptools.build_meta"

[project]
name = "testflinger-cli"
description = "Testflinger CLI"
readme = "README.rst"
dependencies = [
  "argcomplete>=3.6.1",
  "pyyaml>=6.0.2",
  "requests>=2.32.3",
  "xdg-base-dirs>=6.0.2",
]
dynamic = ["version"]
requires-python = ">= 3.10"

[project.scripts]
testflinger-cli = "testflinger_cli:cli"
testflinger = "testflinger_cli:cli"

[dependency-groups]
dev = [
  "black>=25.1.0",
  "flake8>=7.2.0",
  "pylint>=3.3.6",
  "pytest>=8.3.5",
  "pytest-cov>=6.0.0",
  "pytest-mock>=3.14.0",
  "requests-mock>=1.12.1",
]

[tool.black]
line-length = 79

[tool.pylint.basic]
good-names = ["k", "v"]

[tool.pylint."messages control"]
disable = ["C0209", "too-many-lines"]

[tool.tox]
requires = ["tox-uv>=1.25.0"]
env_list = ["format", "lint", "unit"]
no_package = true

[tool.tox.env_run_base]
runner = "uv-venv-lock-runner"
dependency_groups = ["dev"]
set_env = { HOME = "{envtmpdir}" }

[tool.tox.env.format]
description = "Run formatting tests"
commands = [["black", "--check", "testflinger_cli"]]

[tool.tox.env.lint]
description = "Run linting tests"
commands = [["flake8", "testflinger_cli"], ["pylint", "testflinger_cli"]]

[tool.tox.env.unit]
description = "Run unit tests"
commands = [["pytest", "--cov=.", "--doctest-modules"]]

[tool.uv]
cache-keys = [{ file = "pyproject.toml" }, { git = { commit = true } }]
