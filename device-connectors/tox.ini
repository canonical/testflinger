[tox]
env_list =
    lock
    format
    lint
    unit
no_package = true
requires =
    tox-uv>=1.25.0

[testenv]
runner = uv-venv-lock-runner
dependency_groups =
    dev

[testenv:lock]
description = Check lock file
commands =
    uv lock --check

[testenv:format]
description = Apply coding style standards to code
commands =
    ruff format
    ruff check --fix

[testenv:lint]
description = Check code against coding style standards
pass_env = RUFF_*
commands =
    ruff format --check
    # keep ruff check last so that it generates the last `results.sarif` file
    # in the GH workflows
    ruff check

[testenv:unit]
description = Run unit tests
commands =
    pytest \
        --doctest-modules \
        --cov=src \
        --cov-branch \
        --cov-report=term \
        --cov-report=xml:coverage.xml \
        {posargs:tests src}
