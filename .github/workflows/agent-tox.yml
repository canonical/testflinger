name: "[agent] Run unit tests"
permissions:
  contents: read
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - common/** # testflinger-agent depends on testflinger-common
      - device-connectors/** # device connectors are used in agent tests
      - agent/**
      - .github/workflows/agent-tox.yml
      - codecov.yaml
  pull_request:
    paths:
      - common/** # testflinger-agent depends on testflinger-common
      - device-connectors/** # device connectors are used in agent tests
      - agent/**
      - .github/workflows/agent-tox.yml
      - codecov.yaml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run unit tests
    defaults:
      run:
        working-directory: agent
    runs-on: ubuntu-latest
    permissions:
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install uv and set up Python
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - run: sudo snap install --classic just
      - run: just check-lock
      - run: just lint
        env:
          RUFF_OUTPUT_FORMAT: sarif
          RUFF_OUTPUT_FILE: results.sarif
      - run: just test
      - name: Upload coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: coverage.xml
          flags: agent
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: results.sarif
          path: agent/results.sarif

      - name: Upload scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: agent/results.sarif

  test_charm:
    name: Run charm unit tests
    defaults:
      run:
        working-directory: agent/charms/testflinger-agent-host-charm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install uv and set up Python
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - run: sudo snap install --classic just
      - run: just check-lock
      - run: just lint
      - run: just test

  test_charm_integration:
    name: Run charm integration tests
    defaults:
      run:
        working-directory: agent/charms/testflinger-agent-host-charm
    runs-on: [self-hosted, linux, jammy, X64]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install uv and set up Python
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - run: sudo snap install --classic just
      - run: just --yes setup
      - run: just integration --juju-dump-logs logs
      - name: Upload charm as an artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: agent-charm
          path: agent/charms/testflinger-agent-host-charm/*.charm
          if-no-files-found: error
          retention-days: 2
      - name: Upload logs
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: juju-dump-logs
          path: agent/charms/testflinger-agent-host-charm/logs
          retention-days: 2
