name: "[server] Run unit tests"
permissions:
  contents: read
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/server-tox.yml
      - server/**
      - codecov.yaml
  pull_request:
    paths:
      - .github/workflows/server-tox.yml
      - server/**
      - codecov.yaml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run unit tests
    defaults:
      run:
        working-directory: server
    runs-on: ubuntu-latest
    permissions:
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install uv and set up Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - run: sudo snap install --classic just
      - run: just check-lock
      - run: just lint
        env:
          RUFF_OUTPUT_FORMAT: sarif
          RUFF_OUTPUT_FILE: results.sarif
      - run: just check-schema
      - run: just test
      - name: Upload coverage
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: coverage.xml
          flags: server
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: results.sarif
          path: server/results.sarif
      - name: Upload scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        with:
          sarif_file: server/results.sarif

  test_charm:
    name: Run charm unit tests
    defaults:
      run:
        working-directory: server/charm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install uv and set up Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - run: sudo snap install --classic just
      - run: just check-lock
      - run: just lint
      - run: just test
      - name: Upload coverage
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: coverage.xml
          flags: server
          token: ${{ secrets.CODECOV_TOKEN }}

  test_charm_integration:
    name: Run charm integration tests
    defaults:
      run:
        working-directory: server/charm/
    runs-on: [self-hosted, linux, jammy, X64]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install uv and set up Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - run: sudo snap install --classic just
      - run: just --yes setup
      - name: Export Juju controller names
        run: |
          K8S_CONTROLLER=$(juju controllers --format=json | jq -r '.controllers | to_entries[] | select(.value.cloud == "microk8s") | .key')
          LXD_CONTROLLER=$(juju controllers --format=json | jq -r '.controllers | to_entries[] | select(.value.cloud == "localhost") | .key')
          if [[ -z "$K8S_CONTROLLER" || -z "$LXD_CONTROLLER" ]]; then
            echo "Failed to detect Juju controllers (microk8s='$K8S_CONTROLLER', localhost='$LXD_CONTROLLER')"
            juju controllers
            exit 1
          fi
          echo "JUJU_K8S_CONTROLLER=$K8S_CONTROLLER" >> "$GITHUB_ENV"
          echo "JUJU_MACHINE_CONTROLLER=$LXD_CONTROLLER" >> "$GITHUB_ENV"
      - run: just integration --juju-dump-logs logs
        env:
          JUJU_K8S_CONTROLLER: ${{ env.JUJU_K8S_CONTROLLER }}
          JUJU_MACHINE_CONTROLLER: ${{ env.JUJU_MACHINE_CONTROLLER }}
      - name: Upload charm as an artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: server-charm
          path: server/charm/*.charm
          if-no-files-found: error
          retention-days: 2
      - name: Upload Juju logs
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: juju-dump-logs
          path: server/charm/logs
          retention-days: 2
